# Netlify configuration — Bridge GAD Generator
# Architecture:
#   Netlify hosts: static landing page (public/) + serverless functions (netlify/functions/)
#   Streamlit app: deployed separately on Streamlit Cloud
#   FastAPI:       deployed separately (Docker / Railway / Render)
#
# Netlify role: public-facing entry point + API proxy layer

[build]
  publish   = "public"
  functions = "netlify/functions"
  command   = "echo 'Static site — no build step required'"

[build.environment]
  NODE_VERSION    = "18"
  PYTHON_VERSION  = "3.11"

# ── Redirects & proxies ───────────────────────────────────────────────────────

# Proxy /api/* → Netlify Functions (serverless)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Proxy /app → Streamlit Cloud (set STREAMLIT_APP_URL in Netlify env vars)
[[redirects]]
  from   = "/app"
  to     = ":STREAMLIT_APP_URL"
  status = 302
  force  = true

# SPA fallback — serve index.html for all unmatched routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https:;"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Netlify Functions config ──────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"

# ── Dev server (netlify dev) ──────────────────────────────────────────────────
[dev]
  command    = "python -m http.server 3000 --directory public"
  port       = 3000
  targetPort = 3000
  publish    = "public"
